{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="{% static 'reset_style.css' %}">
    <style>
        /* Добавим немного стилей для отображения ошибок */
        .django-errors {
            color: #ff4d4d;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            list-style: none;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="triangle-bg"></div>
        <div class="content-box">
            <h2>Восстановление пароля</h2>
            
            <form method="post">
                {% csrf_token %}

                <!-- ВАЖНО: Вывод ошибок валидации пароля (длина, простота и т.д.) -->
                {% if form.errors %}
                    <div class="django-errors">
                        {% for field in form %}
                            {% for error in field.errors %}
                                <div>{{ error }}</div>
                            {% endfor %}
                        {% endfor %}
                        {% for error in form.non_field_errors %}
                            <div>{{ error }}</div>
                        {% endfor %}
                    </div>
                {% endif %}

                <label>Введите новый пароль</label>
                <!-- Django ожидает поля с именами new_password1 и new_password2, это у вас верно -->
                <input type="password" name="new_password1" id="p1" required>
                
                <label>Повторите новый пароль</label>
                <input type="password" name="new_password2" id="p2" required>
                
                <div id="matchError" class="error-msg" style="display:none; color: red;">Пароли не совпадают</div>

                <button type="submit" class="submit-btn" id="confirmBtn" disabled>Отправить</button>
            </form>
        </div>
    </div>

    <script>
        const p1 = document.getElementById('p1');
        const p2 = document.getElementById('p2');
        const btn = document.getElementById('confirmBtn');
        const err = document.getElementById('matchError');

        function validate() {
            // Проверка на совпадение и длину (Django по умолчанию требует минимум 8 символов)
            const match = p1.value === p2.value && p1.value.length >= 8;
            btn.disabled = !match;
            err.style.display = (p2.value !== '' && p1.value !== p2.value) ? 'block' : 'none';
        }

        p1.addEventListener('input', validate);
        p2.addEventListener('input', validate);
    </script>
</body>
</html>
