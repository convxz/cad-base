{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="{% static 'reset_style.css' %}">
    <style>
        /* Стили специально для финального экрана */
        .success-box {
            text-align: left;
            padding-left: 10%;
        }
        .success-box h2 {
            font-size: 28px;
            margin-bottom: 20px;
        }
        .login-link {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: underline;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <!-- Тот же треугольник, что и на странице подтверждения -->
        <div class="triangle-bg"></div> 
        <div class="content-box success-box">
            <h2>Пароль успешно изменен!</h2>
            <p>Теперь вы можете войти в свой аккаунт, используя новый пароль.</p>
            <a href="{% url 'login' %}" class="login-link">Перейти к входу</a>
        </div>
    </div>
</body>
</html>
