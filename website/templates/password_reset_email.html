<!DOCTYPE html>
<html>
<body>
    <h2>Восстановление пароля</h2>
    <p>Вы получили это письмо, потому что запросили сброс пароля для вашей учетной записи.</p>
    <p>Пожалуйста, перейдите по ссылке ниже, чтобы выбрать новый пароль:</p>
    
    <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}">
        Нажмите здесь, чтобы сбросить пароль
    </a>

    <p>Если вы не запрашивали сброс пароля, просто проигнорируйте это письмо.</p>
</body>
</html>
