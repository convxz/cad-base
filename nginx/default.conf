upstream django {
    server web:8000;
}

# 1. Редирект с HTTP на HTTPS
server {
    listen 80;
    server_name cadbase.pro www.cadbase.pro;
    return 301 https://$host$request_uri;
}

# 2. Основной блок HTTPS
server {
    listen 443 ssl;
    server_name cadbase.pro www.cadbase.pro;

    # Пути к сертификатам, которые выдаст Certbot
    ssl_certificate /etc/letsencrypt/live/cadbase.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cadbase.pro/privkey.pem;

    # Оптимизация SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    location / {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https; # Форсируем https для Django
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }
}